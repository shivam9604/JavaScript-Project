<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css"
      integrity="sha512-10/jx2EXwxxWqCLX/hHth/vu2KY3jCF70dCQB8TSgNjbCVAC/8vai53GfMDrO2Emgwccf2pJqxct9ehpzG+MTw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Time-Date</title>
    <link rel="stylesheet" href="style.css" />

  </head>
  <body>
    <div class="container">
      <div class="clockHolder">
        <div class="timeHolder">
          <div class="timeOptions">
            <i class="fas fa-clock" data-title="Time"></i>
          </div>
          <div class="mainClock">
            <p id="clock"></p>
          </div>
        </div>
      </div>
      <div class="dateHolder">
        <div class="dateOptions">
            <i class="fa-regular fa-calendar"></i></i>
          </div>
        <div class="mainDate">
            <p id="date"></p>
          </div>
      </div>
    </div>

    <script>

      // Getting Time
      const currentTime = () => {
        let curTime = new Date().toLocaleTimeString();
        document.getElementById("clock").innerText = curTime;
      };
      currentTime();

      const intervalId = setInterval(() => {
        currentTime();
      },1000);

      // setTimeout(() => clearInterval(intervalId),5000);    //to stop after 5 sec 

      // Getting Date
      const currentDate = () => {
        let curDate = new Date().toLocaleDateString();
        document.getElementById("date").innerText = curDate;
      };
      currentDate();
    </script>
  </body>
</html>
